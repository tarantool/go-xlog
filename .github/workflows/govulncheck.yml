name: govulncheck

on:
  schedule:
    - cron: "0 0 * * 6" # Weekly on Saturday at 00:00 UTC.
  pull_request:
  workflow_dispatch:
    inputs:
      test_notification:
        description: "Send notification regardless of scan outcome (for testing)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  govulncheck:
    # Skip same-repo PRs to avoid double runs; schedule and workflow_dispatch
    # (which are not pull_request events) always run, and fork PRs still run.
    if: github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        id: govulncheck
        run: govulncheck ./...

      - name: Run govulncheck (examples)
        id: govulncheck_examples
        if: always() && steps.govulncheck.outcome != 'skipped'
        working-directory: examples
        run: govulncheck ./...

      - name: Send notification on scheduled run failure
        if: |
          always() &&
          (github.event_name == 'schedule' &&
           (steps.govulncheck.outcome == 'failure' ||
            steps.govulncheck_examples.outcome == 'failure')) ||
          (github.event_name == 'workflow_dispatch' && inputs.test_notification)
        uses: tarantool/actions/report-job-status@master
        with:
          bot-token: ${{ secrets.ECO_VK_WORKSPACE_BOT_TOKEN }}
          chat-id: ${{ secrets.ECO_VK_WORKSPACE_GOVULNCHECK_CHAT_ID }}
          job-name: ${{ github.job }}
          job-steps: ${{ toJson(steps) }}
